name: Build

# Reusable workflow: build artifacts from source and tag the commit.
#
# Call this from your repo's BUILD.yml:
#   uses: ALM4Dataverse/ALM4Dataverse/.github/workflows/build.yml@stable
#
# Outputs the GitHub Actions run ID so downstream DEPLOY workflows can
# download the artifacts produced here. The caller workflow supplies the exact
# BUILD name so the Actions run title, deployment selection, and the
# "Set build number" step all stay perfectly aligned. When that name is used in
# git tags later, this workflow sanitizes it automatically.

on:
  workflow_call:
    inputs:
      build-name:
        required: true
        type: string
        description: 'Exact BUILD name to use for the run title, deployment selection, and build-number step'
      source-ref:
        required: false
        type: string
        default: ''
        description: 'Optional source branch/commit to build (for workflow_run callers, pass workflow_run.head_sha)'
      source-branch:
        required: false
        type: string
        default: ''
        description: 'Optional source branch name used for downstream repository_dispatch payloads'
      environment-name:
        required: false
        type: string
        default: ''
        description: 'Optional environment name to use for pre-build Dataverse connect and solution validation.'
      timeout-minutes:
        required: false
        type: number
        default: 360
        description: 'Job timeout in minutes (matches Azure DevOps default)'
    outputs:
      run-id:
        description: 'Internal numeric GitHub Actions run ID for this build (used for artifact download)'
        value: ${{ jobs.build.outputs.run-id }}
      run-name:
        description: 'Exact BUILD name used for deployment selection'
        value: ${{ jobs.build.outputs.run-name }}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment:
      name: ${{ inputs.environment-name }}
      deployment: false
    permissions:
      contents: write  # push git tag
      actions: write   # upload artifacts
      id-token: write  # optional OIDC token for Dataverse connect
    outputs:
      run-id: ${{ github.run_id }}
      run-name: ${{ steps.build-number.outputs.run_name }}
    env:
      AZURE_CLIENT_ID:     ${{ vars.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID:     ${{ vars.AZURE_TENANT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      DATAVERSE_URL:       ${{ vars.DATAVERSE_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source-ref != '' && inputs.source-ref || github.sha }}
          path: self
          fetch-depth: 1

      - name: Resolve ALM checkout source
        id: resolve-alm-source
        shell: pwsh
        env:
          JOB_CONTEXT_JSON: ${{ toJson(job) }}
        run: |
          $jobContextJson = $env:JOB_CONTEXT_JSON

          $resolvedRepo = ''
          $resolvedRef = ''

          try {
            $jobContext = $jobContextJson | ConvertFrom-Json -AsHashtable
            if ($jobContext.ContainsKey('workflow_repository')) {
              $resolvedRepo = [string]$jobContext['workflow_repository']
            }
            if ($jobContext.ContainsKey('workflow_sha')) {
              $resolvedRef = [string]$jobContext['workflow_sha']
            }
            if (([string]::IsNullOrWhiteSpace($resolvedRepo) -or [string]::IsNullOrWhiteSpace($resolvedRef)) -and $jobContext.ContainsKey('workflow_ref')) {
              $workflowRef = [string]$jobContext['workflow_ref']
              if ($workflowRef -match '^(?<repo>[^/]+/[^/]+)/\.github/workflows/[^@]+@(?<ref>.+)$') {
                if ([string]::IsNullOrWhiteSpace($resolvedRepo)) {
                  $resolvedRepo = $Matches['repo']
                }
                if ([string]::IsNullOrWhiteSpace($resolvedRef)) {
                  $resolvedRef = $Matches['ref']
                }
              }
            }
          }
          catch {
            Write-Host "Warning: Failed to parse job context for workflow identity. Falling back to defaults."
          }

          if ([string]::IsNullOrWhiteSpace($resolvedRepo)) {
            $resolvedRepo = 'ALM4Dataverse/ALM4Dataverse'
          }
          if ([string]::IsNullOrWhiteSpace($resolvedRef)) {
            $resolvedRef = 'stable'
          }

          "repository=$resolvedRepo" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "ref=$resolvedRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Resolved ALM checkout source: $resolvedRepo@$resolvedRef"

      - name: Checkout ALM4Dataverse
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve-alm-source.outputs.repository }}
          ref: ${{ steps.resolve-alm-source.outputs.ref }}
          path: alm

      - name: Resolve dependency cache keys
        id: dependency-cache
        shell: pwsh
        working-directory: ${{ github.workspace }}/self
        run: |
          & "${{ github.workspace }}/alm/pipelines/scripts/resolvedependencycache.ps1" `
            -BaseDirectory "${{ github.workspace }}/self" `
            -AlmScriptsRoot "${{ github.workspace }}/alm/pipelines/scripts"

      - name: Cache PowerShell modules
        if: steps.dependency-cache.outputs.module_cache_enabled == 'true'
        uses: actions/cache@v4
        with:
          key: ${{ steps.dependency-cache.outputs.module_cache_key }}
          path: |
            ~\Documents\PowerShell\Modules
            ~\Documents\WindowsPowerShell\Modules

      - name: Cache PAC CLI
        if: steps.dependency-cache.outputs.pac_cache_enabled == 'true'
        uses: actions/cache@v4
        with:
          key: ${{ steps.dependency-cache.outputs.pac_cache_key }}
          path: ~\.alm4dataverse\tools

      - name: Set build number
        id: build-number
        shell: pwsh
        run: |
          $buildNumber = '${{ inputs.build-name }}'
          echo "BUILD_NUMBER=$buildNumber" >> $env:GITHUB_ENV
          "run_name=$buildNumber" >> $env:GITHUB_OUTPUT
          Write-Host "Exact build name: $buildNumber"
          Write-Host "Build number: $buildNumber"

      - name: Resolve prefixed repo variables and secrets
        if: inputs.environment-name != ''
        shell: pwsh
        env:
          ALL_REPO_VARS_JSON: ${{ toJSON(vars) }}
          ALL_REPO_SECRETS_JSON: ${{ toJSON(secrets) }}
          RESOLVED_ENVIRONMENT_NAME: ${{ inputs.environment-name }}
        run: |
          function ConvertTo-HashtableSafe([string]$jsonText) {
            if ([string]::IsNullOrWhiteSpace($jsonText)) {
              return @{}
            }

            try {
              $result = $jsonText | ConvertFrom-Json -AsHashtable
              if ($null -eq $result) {
                return @{}
              }

              return $result
            } catch {
              Write-Warning "Could not parse JSON context for prefixed mapping. Continuing without it."
              return @{}
            }
          }

          function Write-GitHubEnv([string]$name, [string]$value) {
            $delimiter = "EOF_$([Guid]::NewGuid().ToString('N'))"
            Add-Content -Path $env:GITHUB_ENV -Value "$name<<$delimiter"
            Add-Content -Path $env:GITHUB_ENV -Value $value
            Add-Content -Path $env:GITHUB_ENV -Value $delimiter
          }

          function Get-PrefixFromEnvironment([string]$environmentName) {
            if ([string]::IsNullOrWhiteSpace($environmentName)) {
              return ''
            }

            $normalized = ($environmentName.Trim().ToUpperInvariant() -replace '[^A-Z0-9]+', '_').Trim('_')
            if ([string]::IsNullOrWhiteSpace($normalized)) {
              return ''
            }

            return "$normalized`_"
          }

          $aliasTargets = @{
            'DATAVERSE_SERVICE_ACCOUNT_UPN' = 'DATAVERSESERVICEACCOUNTUPN'
            'DATAVERSE_CONN_REFS'           = 'DATAVERSE_CONNECTION_REFS'
          }

          $derivedPrefix   = Get-PrefixFromEnvironment $env:RESOLVED_ENVIRONMENT_NAME
          $prefixCandidates = @('PREFIX_')
          if (-not [string]::IsNullOrWhiteSpace($derivedPrefix) -and $derivedPrefix -ne 'PREFIX_') {
            $prefixCandidates = @($derivedPrefix) + $prefixCandidates
          }

          $sources = @(
            @{ Name = 'secrets';   Data = ConvertTo-HashtableSafe $env:ALL_REPO_SECRETS_JSON; IsSensitive = $true  },
            @{ Name = 'variables'; Data = ConvertTo-HashtableSafe $env:ALL_REPO_VARS_JSON;    IsSensitive = $false }
          )

          $setCount = 0
          foreach ($source in $sources) {
            foreach ($entry in $source.Data.GetEnumerator()) {
              $fullName = [string]$entry.Key

              $matchedPrefix = $null
              foreach ($candidate in $prefixCandidates) {
                if ($fullName.StartsWith($candidate, [System.StringComparison]::OrdinalIgnoreCase)) {
                  $matchedPrefix = $candidate
                  break
                }
              }

              if ($null -eq $matchedPrefix) {
                continue
              }

              $targetName = $fullName.Substring($matchedPrefix.Length)
              if ([string]::IsNullOrWhiteSpace($targetName)) {
                continue
              }

              $targetNames = @($targetName)
              if ($aliasTargets.ContainsKey($targetName)) {
                $targetNames += $aliasTargets[$targetName]
              }

              $rawValue = $entry.Value
              if ($null -eq $rawValue) {
                continue
              }

              $valueText = if ($rawValue -is [string]) {
                [string]$rawValue
              } else {
                $rawValue | ConvertTo-Json -Compress -Depth 50
              }

              if ([string]::IsNullOrWhiteSpace($valueText)) {
                continue
              }

              foreach ($name in ($targetNames | Select-Object -Unique)) {
                if (-not [string]::IsNullOrWhiteSpace([System.Environment]::GetEnvironmentVariable($name))) {
                  continue
                }

                [System.Environment]::SetEnvironmentVariable($name, $valueText)
                Write-GitHubEnv -name $name -value $valueText
                if ($source.IsSensitive) {
                  Write-Output "::add-mask::$valueText"
                }

                $setCount++
                Write-Host "Mapped prefixed $($source.Name) '$fullName' -> '$name'"
              }
            }
          }

          Write-Host "Prefixed mapping complete. Variables set: $setCount"

      - name: Validate authentication inputs
        if: inputs.environment-name != ''
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_ID)) {
            throw "AZURE_CLIENT_ID is required. Set GitHub environment variable AZURE_CLIENT_ID or provide a prefixed repo-level secret/variable."
          }

          if ([string]::IsNullOrWhiteSpace($env:AZURE_TENANT_ID)) {
            throw "AZURE_TENANT_ID is required. Set GitHub environment variable AZURE_TENANT_ID or provide a prefixed repo-level secret/variable."
          }

          $tenant = $env:AZURE_TENANT_ID.Trim()
          $isGuid = $tenant -match '^[0-9a-fA-F]{8}-([0-9a-fA-F]{4}-){3}[0-9a-fA-F]{12}$'
          $isDns  = $tenant -match '^[A-Za-z0-9][A-Za-z0-9.-]*\.[A-Za-z]{2,}$'
          if (-not ($isGuid -or $isDns)) {
            throw "AZURE_TENANT_ID value '$tenant' is invalid. Use a tenant GUID or tenant domain (for example, contoso.onmicrosoft.com)."
          }

          if ([string]::IsNullOrWhiteSpace($env:DATAVERSE_URL)) {
            throw "DATAVERSE_URL is required. Set GitHub environment variable DATAVERSE_URL or provide a prefixed repo-level variable."
          }

      - name: Set up Workload Identity Federation (if no client secret)
        if: inputs.environment-name != ''
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:AZURE_CLIENT_SECRET)) {
            Write-Host "AZURE_CLIENT_SECRET is set; skipping OIDC token file setup."
            exit 0
          }

          if ([string]::IsNullOrWhiteSpace($env:ACTIONS_ID_TOKEN_REQUEST_URL) -or [string]::IsNullOrWhiteSpace($env:ACTIONS_ID_TOKEN_REQUEST_TOKEN)) {
            throw "OIDC token request variables are unavailable. Ensure 'permissions: id-token: write' is granted to this job."
          }

          $audience = 'api://AzureADTokenExchange'
          $requestUrl = "$($env:ACTIONS_ID_TOKEN_REQUEST_URL)&audience=$([System.Uri]::EscapeDataString($audience))"
          $headers = @{ Authorization = "bearer $($env:ACTIONS_ID_TOKEN_REQUEST_TOKEN)" }
          $response = Invoke-RestMethod -Method Get -Uri $requestUrl -Headers $headers
          $token = [string]$response.value
          if ([string]::IsNullOrWhiteSpace($token)) {
            throw "Received an empty OIDC token from GitHub."
          }

          $tokenPath = Join-Path $env:RUNNER_TEMP 'github-oidc-token.txt'
          Set-Content -LiteralPath $tokenPath -Value $token -NoNewline

          "AZURE_FEDERATED_TOKEN_FILE=$tokenPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Configured AZURE_FEDERATED_TOKEN_FILE for DefaultAzureCredential."

      - name: Install Dependencies and Build
        shell: pwsh
        working-directory: ${{ github.workspace }}/self
        run: |
          & "${{ github.workspace }}/alm/pipelines/scripts/installdependencies.ps1"
          if ('${{ inputs.environment-name }}' -ne '') {
            & "${{ github.workspace }}/alm/pipelines/scripts/connect.ps1" -Url $env:DATAVERSE_URL
          }
          & "${{ github.workspace }}/alm/pipelines/scripts/build.ps1" `
            -SourceDirectory "${{ github.workspace }}/self" `
            -ArtifactStagingDirectory "${{ github.workspace }}/artifacts"

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: ${{ github.workspace }}/artifacts/
          retention-days: 90
          if-no-files-found: warn

      - name: Upload solution check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: solution-check-report
          path: ${{ github.workspace }}/artifacts/solution-check/
          retention-days: 90
          if-no-files-found: ignore

      - name: Tag source with build version
        shell: pwsh
        working-directory: ${{ github.workspace }}/self
        run: |
          $ErrorActionPreference = 'Stop'
          $rawBuildNumber = $env:BUILD_NUMBER
          $sanitizedBuildNumber = $rawBuildNumber `
            -replace '[^a-zA-Z0-9._/-]', '-' `
            -replace '\.{2,}', '-' `
            -replace '/{2,}', '/'
          $sanitizedBuildNumber = $sanitizedBuildNumber.Trim('/', '.')
          if ($sanitizedBuildNumber.EndsWith('.lock')) {
            $sanitizedBuildNumber = $sanitizedBuildNumber -replace '\.lock$', '-lock'
          }
          if ([string]::IsNullOrWhiteSpace($sanitizedBuildNumber)) {
            throw "Build number '$rawBuildNumber' cannot be converted to a valid git tag value"
          }
          $tagName = "v$sanitizedBuildNumber"
          Write-Host "Tagging source repository with build version $tagName"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          if ($LASTEXITCODE -ne 0) { throw "git config user.email failed" }
          git config user.name "${{ github.actor }}"
          if ($LASTEXITCODE -ne 0) { throw "git config user.name failed" }
          git tag -a "$tagName" -m "Build version $sanitizedBuildNumber"
          if ($LASTEXITCODE -ne 0) { throw "git tag failed with exit code $LASTEXITCODE" }
          git push origin "$tagName"
          if ($LASTEXITCODE -ne 0) { throw "git push tag failed with exit code $LASTEXITCODE" }

      - name: Trigger DEPLOY via repository_dispatch
        shell: pwsh
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          BUILD_RUN_ID: ${{ github.run_id }}
          BUILD_RUN_NAME: ${{ steps.build-number.outputs.run_name }}
          BUILD_BRANCH: ${{ inputs.source-branch != '' && inputs.source-branch || github.ref_name }}
          BUILD_SOURCE_SHA: ${{ inputs.source-ref != '' && inputs.source-ref || github.sha }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
            throw "No token available for repository dispatch."
          }

          $sourceSha = [string]$env:BUILD_SOURCE_SHA
          if ([string]::IsNullOrWhiteSpace($sourceSha)) {
            throw "Failed to resolve source commit SHA for repository_dispatch payload."
          }

          $eventBranchToken = ([string]$env:BUILD_BRANCH).ToLowerInvariant() -replace '[^a-z0-9]+', '-'
          $eventBranchToken = $eventBranchToken.Trim('-')
          if ([string]::IsNullOrWhiteSpace($eventBranchToken)) {
            throw "Failed to resolve branch token for repository_dispatch event type from branch '$($env:BUILD_BRANCH)'."
          }

          $eventType = "alm4dataverse-build-deploy-$eventBranchToken"
          $payload = @{
            event_type = $eventType
            client_payload = @{
              branch         = $env:BUILD_BRANCH
              sha            = $sourceSha
              build_run_id   = $env:BUILD_RUN_ID
              build_run_name = $env:BUILD_RUN_NAME
              build_run_url  = "https://github.com/$($env:GH_REPO)/actions/runs/$($env:BUILD_RUN_ID)"
              build_event    = "${{ github.event_name }}"
              dispatched_at  = (Get-Date).ToUniversalTime().ToString('o')
            }
          } | ConvertTo-Json -Depth 10 -Compress

          Write-Host "Dispatching repository event '$eventType' for repo '$($env:GH_REPO)' on branch '$($env:BUILD_BRANCH)'..."
          $result = @($payload | & gh api --method POST "repos/$($env:GH_REPO)/dispatches" --input - 2>&1)
          if ($LASTEXITCODE -ne 0) {
            $errorText = @($result | ForEach-Object { [string]$_ }) -join "`n"
            throw "Failed to send repository_dispatch event: $errorText"
          }

          Write-Host "repository_dispatch event sent successfully."
