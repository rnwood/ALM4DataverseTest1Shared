name: DEPLOY-prod

# Manually triggered: deploys a previously built and tested set of artifacts
# to the production environment.
#
# DEPLOYMENT GATE: this workflow checks that the TEST environment was
# successfully deployed for the specified build BEFORE it proceeds.  If the
# gate tag is absent (i.e. DEPLOY-main never ran successfully for this build)
# the workflow fails immediately with a clear error message.  This enforces
# ordered promotion without environment protection rules and works on all
# GitHub licence levels.
#
# How to use:
#   1. Run BUILD on main (automatic on push).
#   2. Confirm DEPLOY-main (TEST) completed successfully in the Actions tab.
#   3. Find the BUILD run ID from the URL or the Actions tab.
#   4. Go to Actions > DEPLOY-prod > Run workflow, enter the BUILD run ID.
#
# SETUP REQUIRED:
#   1. Configure credentials — see docs/setup/github-setup.md.
#   2. Adjust environment names and gate tags to match your pipeline stages.
#      If you have a UAT stage between TEST and PROD, change required-gate-tag
#      here to deployed/UAT-main/{build-run-id} and create a DEPLOY-uat.yml
#      following the same pattern.

on:
  workflow_dispatch:
    inputs:
      build-run-id:
        description: >
          BUILD workflow run ID to deploy.
          Must have been successfully deployed to TEST first.
          Find it in the Actions tab URL: .../actions/runs/{run-id}
        required: true
        type: string

jobs:

  # ── APPROACH 1 & 2: GitHub Environments (WIF or client secret) ───────────────

  deploy-prod:
    uses: ALM4Dataverse/ALM4Dataverse/.github/workflows/deploy-environment-reusable.yml@stable
    permissions:
      actions: read
      contents: write
      id-token: write
    with:
      environment-name: PROD
      build-run-id: ${{ inputs.build-run-id }}
      # Gate: fail immediately if TEST was not successfully deployed for this build.
      required-gate-tag: deployed/TEST-main/${{ inputs.build-run-id }}
      success-gate-tag:  deployed/PROD/${{ inputs.build-run-id }}
    secrets: inherit


  # ── APPROACH 3: Prefixed global secrets (all licence levels) ─────────────────
